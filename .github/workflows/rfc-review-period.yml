name: RFC Review Period

on:
  pull_request:
    types: [opened, synchronize]
  schedule:
    # Prüft offene PRs täglich um 8 Uhr
    - cron: '0 8 * * *'

jobs:
  check-review-period:
    name: 7-Tage Review-Phase
    runs-on: ubuntu-latest
    steps:
      - name: Prüfe Review-Zeitraum
        uses: actions/github-script@v7
        with:
          script: |
            const REVIEW_DAYS = 7;

            // Bei schedule: alle offenen PRs prüfen
            if (context.eventName === 'schedule') {
              const pulls = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              for (const pr of pulls.data) {
                const created = new Date(pr.created_at);
                const now = new Date();
                const days = (now - created) / (1000 * 60 * 60 * 24);
                const passed = days >= REVIEW_DAYS;

                await github.rest.repos.createCommitStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  sha: pr.head.sha,
                  state: passed ? 'success' : 'pending',
                  context: '7-Tage Review-Phase',
                  description: passed
                    ? `Review-Phase abgeschlossen (${Math.floor(days)} Tage)`
                    : `Review-Phase läuft noch (${Math.floor(days)}/${REVIEW_DAYS} Tage)`
                });
              }
              return;
            }

            // Bei PR-Events: diesen PR prüfen
            const created = new Date(context.payload.pull_request.created_at);
            const now = new Date();
            const days = (now - created) / (1000 * 60 * 60 * 24);
            const passed = days >= REVIEW_DAYS;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: passed ? 'success' : 'pending',
              context: '7-Tage Review-Phase',
              description: passed
                ? `Review-Phase abgeschlossen (${Math.floor(days)} Tage)`
                : `Review-Phase läuft noch (${Math.floor(days)}/${REVIEW_DAYS} Tage)`
            });

  sync-pr-body:
    name: RFC-Text → PR-Body synchronisieren
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: RFC-Datei finden und PR-Body aktualisieren
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const glob = require('glob');

            // Finde die RFC-Datei (es sollte genau eine neue sein)
            const files = glob.sync('rfcs/[0-9]*.md');
            if (files.length === 0) return;

            // Finde die Datei die in diesem PR geändert wurde
            const { data: prFiles } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const rfcFile = prFiles.find(f => f.filename.startsWith('rfcs/') && f.filename.endsWith('.md'));
            if (!rfcFile) return;

            const content = fs.readFileSync(rfcFile.filename, 'utf8');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: content
            });

            console.log(`PR-Body synchronisiert mit ${rfcFile.filename}`);
